<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>习惯打卡</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:#f4f6f8;color:#1a1a2e;line-height:1.5;padding:0 0 2rem;-webkit-font-smoothing:antialiased}
button,input,select{font:inherit;border:none;outline:none;background:none;color:inherit}
button{cursor:pointer}
.app{max-width:480px;margin:0 auto;padding:0 .75rem}
.header{background:#fff;border-radius:16px;margin:.75rem 0;padding:1rem 1.125rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.date-row{display:flex;align-items:baseline;gap:.5rem}
.date-day{font-size:1.5rem;font-weight:700;letter-spacing:.02em}
.date-sub{font-size:.85rem;color:#8e8ea0}.date-sub span+span::before{content:"\00B7";margin:0 .3rem}
.viewing-banner{display:none;margin-top:.5rem;padding:.35rem .75rem;border-radius:8px;font-size:.8rem;color:#6b7280;background:#f0fdf4;align-items:center;justify-content:space-between}
.viewing-banner.show{display:flex}.viewing-banner .btn-today{color:#16a34a;font-weight:600;padding:.2rem .5rem;border-radius:6px}
.viewing-banner .btn-today:active{background:#dcfce7}
.progress-wrap{margin-top:.75rem}
.progress-text{font-size:.82rem;color:#6b7280;margin-bottom:.35rem}
.progress-track{height:5px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:99px;transition:width .4s ease;width:0%}.week-progress-wrap{margin-top:.5rem}.week-progress-wrap .progress-text{font-size:.75rem;color:#8e8ea0}.week-progress-wrap .week-fill{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.habit-card{background:#fff;border-radius:16px;margin:.75rem 0;padding:1rem 1rem .6rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.habit-card-title{font-size:.8rem;color:#8e8ea0;margin-bottom:.4rem;font-weight:500}
.htable{display:grid;grid-template-columns:24px 1fr 48px 48px 52px;gap:3px 6px;align-items:center}
.htable-hdr{display:contents}
.htable-hdr>div{padding:.3rem 0 .2rem;font-size:.72rem;color:#9ca3af;font-weight:500;border-bottom:1px solid #f0f0f0;text-align:center}
.htable-hdr>div:first-child,.htable-hdr>div:nth-child(2){text-align:left;padding-left:2px}
.hrow{display:contents}
.hrow>div{padding:.4rem 0;display:flex;align-items:center;min-height:44px}
.hrow>div:first-child{justify-content:center}
.hrow>div:nth-child(3),.hrow>div:nth-child(4){justify-content:center;font-size:.82rem;color:#6b7280;cursor:pointer;border-radius:6px;padding:.15rem 0;transition:background .12s}
.hrow>div:nth-child(3):active,.hrow>div:nth-child(4):active{background:#f3f4f6}
.hrow>div:last-child{justify-content:flex-end;gap:2px}
.habit-check{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;flex-shrink:0}
.habit-check.done{border-color:#22c55e;background:#22c55e}
.habit-check.done::after{content:"";display:block;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px)}
.habit-check:not(.done):active{border-color:#9ca3af}
.hrow .hname{font-size:.95rem;padding:.15rem .25rem .15rem 4px;word-break:break-word;line-height:1.3}
.hrow .hname.done{color:#9ca3af;text-decoration:line-through}
.hrow .hact button{width:26px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:#8e8ea0;transition:all .12s}
.hrow .hact button:active{background:#f3f4f6;color:#4b5563}
.hrow .hact .btn-del:active{color:#ef4444;background:#fef2f2}
.habit-empty{grid-column:1/-1;padding:1.5rem 0;text-align:center;color:#9ca3af;font-size:.9rem}
.add-habit{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;padding:.65rem 0 .4rem;border-top:1px solid #f0f0f0}
.add-habit .ainp{flex:1 1 120px;min-width:0;padding:.5rem .65rem;border-radius:8px;background:#f4f6f8;font-size:.9rem;transition:background .15s}
.add-habit .ainp:focus{background:#e8eaed}.add-habit .ainp::placeholder{color:#b0b0c0}
.add-habit .atime{width:80px;padding:.5rem .4rem;border-radius:8px;background:#f4f6f8;font-size:.82rem;text-align:center;transition:background .15s;color:#4b5563;flex:0 0 auto}
.add-habit .atime::-webkit-calendar-picker-indicator{opacity:.45;margin-left:2px}
.add-habit .atime:focus{background:#e8eaed}
.add-habit .btn-add{padding:.5rem .9rem;border-radius:8px;background:#22c55e;color:#fff;font-size:.85rem;font-weight:600;white-space:nowrap;transition:background .15s}
.add-habit .btn-add:active{background:#16a34a}.add-habit .btn-add:disabled{opacity:.4;cursor:default}
@media(max-width:400px){.htable{grid-template-columns:24px 1fr 44px 44px 46px;gap:3px 4px}.hrow>div:nth-child(3),.hrow>div:nth-child(4){font-size:.75rem}.add-habit .atime{width:72px;font-size:.78rem}}
.calendar-card{background:#fff;border-radius:16px;margin:.75rem 0;padding:1rem 1rem .75rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.calendar-nav{display:flex;align-items:center;gap:.25rem}
.calendar-nav button{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#4b5563;transition:all .12s}
.calendar-nav button:active{background:#f3f4f6}
.calendar-title{font-size:1rem;font-weight:600}
.btn-return-today{font-size:.78rem;color:#22c55e;padding:.3rem .6rem;border-radius:6px;font-weight:500;transition:background .12s}
.btn-return-today:active{background:#f0fdf4}.btn-return-today.hide{opacity:0;pointer-events:none}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-weekday{padding:.35rem 0;text-align:center;font-size:.72rem;color:#9ca3af;font-weight:500}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.85rem;position:relative;transition:all .1s;cursor:default;min-height:36px;background:transparent;color:#374151}
.cal-day.has-habits{cursor:pointer}.cal-day.has-habits:active{transform:scale(.92)}
.cal-day.future{color:#d1d5db}.cal-day.other-month{color:#e5e7eb;box-shadow:none!important}
.cal-day.today{font-weight:700;box-shadow:inset 0 0 0 2px #22c55e}
.cal-day.selected{font-weight:700;box-shadow:inset 0 0 0 2px #16a34a;background:#f0fdf4!important}
.cal-day.lv-0{background:#f3f4f6}.cal-day.lv-1{background:#dcfce7}.cal-day.lv-2{background:#bbf7d0}
.cal-day.lv-3{background:#86efac}.cal-day.lv-4{background:#4ade80}.cal-day.lv-5{background:#22c55e;color:#fff}
.cal-legend{display:flex;align-items:center;justify-content:center;gap:.35rem;margin-top:.6rem;font-size:.72rem;color:#9ca3af}
.cal-legend .swatch{width:12px;height:12px;border-radius:3px;display:inline-block}
.cal-legend .swatch.s0{background:#f3f4f6}.cal-legend .swatch.s3{background:#86efac}.cal-legend .swatch.s5{background:#22c55e}
@media(min-width:481px){.app{padding:0 1rem}.header,.habit-card,.calendar-card{border-radius:20px;padding:1.25rem 1.5rem}.habit-card{padding-bottom:.6rem}}
@media(max-width:360px){.date-day{font-size:1.25rem}.htable{grid-template-columns:20px 1fr 38px 38px 40px;gap:2px}.hrow>div:nth-child(3),.hrow>div:nth-child(4){font-size:.7rem}.cal-day{font-size:.78rem;min-height:32px}}
.progress-fill,.cal-day{will-change:transform}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hrow{animation:fadeIn .25s ease both}
.hrow:nth-child(2){animation-delay:0ms}.hrow:nth-child(3){animation-delay:40ms}.hrow:nth-child(4){animation-delay:80ms}
.hrow:nth-child(5){animation-delay:120ms}.hrow:nth-child(6){animation-delay:160ms}.hrow:nth-child(7){animation-delay:200ms}
.hrow:nth-child(8){animation-delay:240ms}.hrow:nth-child(9){animation-delay:280ms}.hrow:nth-child(10){animation-delay:320ms}
.hrow:nth-child(11){animation-delay:360ms}.hrow:nth-child(12){animation-delay:400ms}
.hrow:nth-child(13){animation-delay:440ms}.hrow:nth-child(14){animation-delay:480ms}
.hrow:nth-child(15){animation-delay:520ms}.hrow:nth-child(16){animation-delay:560ms}
.hrow:nth-child(15){animation-delay:520ms}.hrow:nth-child(16){animation-delay:560ms}
@media(min-width:640px){.app{max-width:720px;display:grid;grid-template-columns:1fr 280px;gap:0 .75rem;align-items:start}.header{grid-column:1/-1}.habit-card{grid-column:1;margin-top:0}.calendar-card{grid-column:2;margin-top:0;position:sticky;top:.75rem}}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <div class="date-row">
      <span class="date-day" id="dateDay"></span>
      <span class="date-sub" id="dateSub"></span>
    </div>
    <div class="viewing-banner" id="viewingBanner">
      <span id="viewingLabel"></span>
      <button class="btn-today" id="btnBackToday">回到今天</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-text" id="progressText">今日完成 0/0</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="week-progress-wrap" id="weekProgressWrap">
      <div class="progress-text" id="weekProgressText">本周完成 0/0</div>
      <div class="progress-track"><div class="progress-fill week-fill" id="weekProgressFill"></div></div>
    </div>
  </header>
  <section class="habit-card">
    <div class="habit-card-title">📌 打卡清单</div>
    <div class="htable" id="habitTable">
      <!-- header + rows rendered by JS -->
    </div>
    <div class="add-habit" id="addHabitForm">
      <input class="ainp" id="habitInput" placeholder="习惯名称" maxlength="20" autocomplete="off">
      <input class="atime" id="startInput" type="time" value="08:00">
      <input class="atime" id="endInput" type="time" value="21:00">
      <button class="btn-add" id="btnAdd" disabled>添加</button>
    </div>
  </section>
  <section class="calendar-card">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button id="prevMonth">‹</button>
        <span class="calendar-title" id="calendarTitle"></span>
        <button id="nextMonth">›</button>
      </div>
      <button class="btn-return-today hide" id="btnCalendarToday">本月</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="cal-legend">
      <span class="swatch s0"></span><span>未打卡</span>
      <span class="swatch s3"></span><span>部分</span>
      <span class="swatch s5"></span><span>全部完成</span>
    </div>
  </section>
</div>
<script>
const STORAGE_KEY='habit-tracker-data';let data={habits:[],records:{}};
function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);data.habits=Array.isArray(p.habits)?p.habits:[];data.records=p.records&&typeof p.records==='object'?p.records:{}}}catch(e){data={habits:[],records:{}}}data.habits=data.habits.filter(h=>h&&h.id&&h.name).map(h=>{if(!h.planStart)h.planStart='08:00';if(!h.planEnd)h.planEnd='21:00';return h})}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function id$(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
const WD=['日','一','二','三','四','五','六'],MO=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
function p2(n){return String(n).padStart(2,'0')}
function fd(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function pd(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function ft(s){return s>fd(new Date())}
function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
let vd=null,cy,cm;
function gV(){return vd||new Date()}function gVS(){return fd(gV())}
function rst(){vd=null;const t=new Date();cy=t.getFullYear();cm=t.getMonth();R()}
function gh(ds){return data.habits.filter(h=>h.createdAt<=ds)}
function addH(n,s,e){n=n.trim();if(!n)return;const now=fd(new Date());data.habits.push({id:id$(),name:n,planStart:s||'08:00',planEnd:e||'21:00',createdAt:now});save();R()}
function delH(id){data.habits=data.habits.filter(h=>h.id!==id);Object.keys(data.records).forEach(ds=>{Object.keys(data.records[ds]).forEach(hid=>{if(!data.habits.some(h=>h.id===hid))delete data.records[ds][hid]});if(Object.keys(data.records[ds]).length===0)delete data.records[ds]});save();R()}
function editN(id){const h=data.habits.find(h=>h.id===id);if(!h)return;const n=prompt('修改习惯名称：',h.name);if(n&&n.trim()&&n.trim()!==h.name){h.name=n.trim();save();R()}}
function editT(id,which){const h=data.habits.find(h=>h.id===id);if(!h)return;const cur=which==='s'?h.planStart:h.planEnd;const v=prompt(which==='s'?'修改计划开始时间 (HH:MM)：':'修改计划结束时间 (HH:MM)：',cur);if(v&&/^\d{2}:\d{2}$/.test(v.trim())){if(which==='s')h.planStart=v.trim();else h.planEnd=v.trim();save();R()}}
function tog(hid,ds){if(!data.records[ds])data.records[ds]={};const r=data.records[ds];if(r[hid]){delete r[hid]}else{r[hid]=true}if(Object.keys(r).length===0)delete data.records[ds];save();R()}
function isD(hid,ds){return !!(data.records[ds]&&data.records[ds][hid])}
function cp(ds){const h=gh(ds),t=h.length;if(!t)return{d:0,t:0,p:0};let d=0;h.forEach(h=>{if(isD(h.id,ds))d++});return{d,t,p:Math.round(d/t*100)}}
function cwp(){const t=new Date(),d=t.getDay(),m=new Date(t);m.setDate(t.getDate()-(d===0?6:d-1));let dn=0,tl=0;for(let x=new Date(m);x<=t;x.setDate(x.getDate()+1)){const ds=fd(x),p=cp(ds);dn+=p.d;tl+=p.t}return{d:dn,t:tl,p:tl>0?Math.round(dn/tl*100):0}}
let _rs=false;function R(){if(_rs)return;_rs=true;requestAnimationFrame(()=>{_rs=false;rHdr();rHabits();rCal()})}
function rHdr(){const d=gV(),ds=fd(d),ts=fd(new Date());document.getElementById('dateDay').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日';document.getElementById('dateSub').innerHTML='<span>'+d.getFullYear()+'年</span><span>星期'+WD[d.getDay()]+'</span>';const bn=document.getElementById('viewingBanner'),lb=document.getElementById('viewingLabel');if(ds===ts){bn.classList.remove('show')}else{bn.classList.add('show');lb.textContent='正在查看 '+(d.getMonth()+1)+'月'+d.getDate()+'日'}const p=cp(ds),wr=document.getElementById('progressWrap');wr.style.display='';document.getElementById('progressText').textContent=(ds===ts?'今日':ft(ds)?'计划':'当日')+'完成 '+p.d+'/'+p.t;document.getElementById('progressFill').style.width=p.p+'%';const wp=cwp();document.getElementById('weekProgressText').textContent='本周完成 '+wp.d+'/'+wp.t;document.getElementById('weekProgressFill').style.width=wp.p+'%'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function rHabits(){const ds=gVS(),tb=document.getElementById('habitTable'),habs=gh(ds);if(!habs.length){tb.innerHTML='<div class="htable-hdr"><div></div><div>名称</div><div>开始</div><div>结束</div><div></div></div><div class="habit-empty">还没有习惯，在上面添加吧 ✨</div>';return}let html='<div class="htable-hdr"><div></div><div>名称</div><div>开始</div><div>结束</div><div></div></div>';habs.forEach(h=>{const done=isD(h.id,ds);const sCls='habit-check'+(done?' done':'');const nCls='hname'+(done?' done':'');html+='<div class="hrow" data-id="'+h.id+'"><div><div class="'+sCls+'" data-a="tog"></div></div><div class="'+nCls+'">'+esc(h.name)+'</div><div data-a="es" data-w="s">'+h.planStart+'</div><div data-a="ee" data-w="e">'+h.planEnd+'</div><div class="hact"><button data-a="ed" aria-label="编辑">&#9998;</button><button class="btn-del" data-a="del" aria-label="删除">&#10005;</button></div></div>'});tb.innerHTML=html;tb.addEventListener('click',function(e){const row=e.target.closest('.hrow');if(!row)return;const id=row.dataset.id,a=e.target.dataset.a||(e.target.closest('[data-a]')?e.target.closest('[data-a]').dataset.a:null);if(!a)return;if(a==='tog'){tog(id,ds)}else if(a==='ed'){editN(id)}else if(a==='del'){if(confirm('确定删除这个习惯吗？'))delH(id)}else if(a==='es'){editT(id,'s')}else if(a==='ee'){editT(id,'e')}},{once:false})}
function rCal(){const t=new Date();if(cy===undefined||cm===undefined){const v=gV();cy=v.getFullYear();cm=v.getMonth()}document.getElementById('calendarTitle').textContent=MO[cm]+' '+cy;const bCT=document.getElementById('btnCalendarToday');if(cy===t.getFullYear()&&cm===t.getMonth()){bCT.classList.add('hide')}else{bCT.classList.remove('hide')}const grid=document.getElementById('calendarGrid'),fd0=new Date(cy,cm,1).getDay(),dim=new Date(cy,cm+1,0).getDate(),ts=fd(t),vs=gVS();let html='';WD.forEach(w=>{html+='<div class="cal-weekday">'+w+'</div>'});for(let i=0;i<fd0;i++){html+='<div class="cal-day other-month"></div>'}for(let d=1;d<=dim;d++){const dobj=new Date(cy,cm,d),ds=fd(dobj),isT=ds===ts,isF=ds>ts,isS=ds===vs,vh=gh(ds),hh=vh.length>0;let lv=-1;if(hh){const p=cp(ds);if(p.t>0){const r=p.d/p.t;if(r===0)lv=0;else if(r<0.3)lv=1;else if(r<0.6)lv=2;else if(r<0.9)lv=3;else if(r<1)lv=4;else lv=5}}const cls=['cal-day'];if(isT)cls.push('today');if(isF)cls.push('future');if(isS)cls.push('selected');if(hh)cls.push('has-habits');if(lv>=0)cls.push('lv-'+lv);html+='<div class="'+cls.join(' ')+'" data-date="'+ds+'">'+d+'</div>'}grid.innerHTML=html;grid.addEventListener('click',function(e){const cell=e.target.closest('.cal-day');if(!cell||cell.classList.contains('other-month'))return;const ds=cell.dataset.date;if(!ds)return;vd=pd(ds);R()},{once:false})}
function init(){load();if(!data.habits.length){const n=fd(new Date());data.habits=[{id:id$(),name:'喝水',planStart:'08:00',planEnd:'22:00',createdAt:n},{id:id$(),name:'运动',planStart:'17:00',planEnd:'17:30',createdAt:n},{id:id$(),name:'数学',planStart:'19:00',planEnd:'21:00',createdAt:n},{id:id$(),name:'英语',planStart:'07:00',planEnd:'07:30',createdAt:n}];save()}const t=new Date();cy=t.getFullYear();cm=t.getMonth();const inp=document.getElementById('habitInput'),st=document.getElementById('startInput'),en=document.getElementById('endInput'),btn=document.getElementById('btnAdd');function chk(){btn.disabled=!inp.value.trim()}inp.addEventListener('input',chk);inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim()){addH(inp.value,st.value,en.value);inp.value='';btn.disabled=true;inp.focus()}});btn.addEventListener('click',()=>{if(inp.value.trim()){addH(inp.value,st.value,en.value);inp.value='';btn.disabled=true;inp.focus()}});document.getElementById('prevMonth').addEventListener('click',()=>{cm--;if(cm<0){cm=11;cy--}R()});document.getElementById('nextMonth').addEventListener('click',()=>{cm++;if(cm>11){cm=0;cy++}R()});document.getElementById('btnCalendarToday').addEventListener('click',()=>{const t=new Date();cy=t.getFullYear();cm=t.getMonth();R()});document.getElementById('btnBackToday').addEventListener('click',rst);R()}
document.addEventListener('DOMContentLoaded',init)
</script>
</body>
</html>
